{% extends 'base.html' %}
{% block title %}Forgot Password — CivicConnect{% endblock %}

{% block content %}
<div class="section-title">Forgot Password</div>
<div class="section-sub">Enter your registered email to receive OTP.</div>

<div class="card-custom" style="max-width:500px; margin:auto;">
  {% if error %}
  <div style="background:#FEF2F2; color:#B91C1C; border:1px solid #FECACA; padding:10px; border-radius:10px; margin-bottom:16px;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label-custom">Registered Email</label>
      <input type="email" name="email" class="form-input" required>
    </div>

    <button type="submit" class="btn-primary-custom" style="width:100%;">
      Send OTP
    </button>
  </form>
</div>
{% endblock %}
