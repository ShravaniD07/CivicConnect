{% extends 'base.html' %}
{% block title %}Reset Password — CivicConnect{% endblock %}

{% block content %}
<div class="section-title">Reset Password</div>
<div class="section-sub">Set your new password.</div>

<div class="card-custom" style="max-width:500px; margin:auto;">
  {% if error %}
  <div style="background:#FEF2F2; color:#B91C1C; border:1px solid #FECACA; padding:10px; border-radius:10px; margin-bottom:16px;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label-custom">New Password</label>
      <input type="password" name="new_password" class="form-input" required>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-input" required>
    </div>

    <button type="submit" class="btn-primary-custom" style="width:100%;">
      Reset Password
    </button>
  </form>
</div>
{% endblock %}
