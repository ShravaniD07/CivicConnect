<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — CivicConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; background: #F0F4FF; }
    .left-panel {
      width: 40%;
      background: linear-gradient(145deg, #1A56DB 0%, #0F2FAA 100%);
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem; position: relative; overflow: hidden;
    }
    .left-panel::before {
      content: ''; position: absolute; width: 300px; height: 300px;
      border-radius: 50%; background: rgba(255,255,255,0.05);
      bottom: -60px; right: -60px;
    }
    .brand-name { font-family: 'DM Serif Display', serif; color: #fff; font-size: 1.6rem; display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; }
    .left-heading { font-family: 'DM Serif Display', serif; color: #fff; font-size: 1.8rem; line-height: 1.3; margin-bottom: 1rem; }
    .left-sub { color: rgba(255,255,255,0.7); font-size: 0.9rem; line-height: 1.7; }
    .right-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: #fff; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 460px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); }
    .auth-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: #1E293B; margin-bottom: 0.3rem; }
    .auth-sub { font-size: 0.88rem; color: #64748B; margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    label { font-size: 0.83rem; font-weight: 500; color: #475569; display: block; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 0.85rem; }
    input, textarea {
      width: 100%; padding: 10px 14px 10px 36px;
      border: 1.5px solid #E2E8F0; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      color: #1E293B; outline: none; transition: border 0.2s;
    }
    textarea { padding-left: 14px; resize: none; }
    input:focus, textarea:focus { border-color: #1A56DB; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #1A56DB, #1040B0);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      font-size: 0.95rem; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,86,219,0.35); }
    .link-text { text-align: center; font-size: 0.88rem; color: #64748B; margin-top: 1rem; }
    .link-text a { color: #1A56DB; font-weight: 500; text-decoration: none; }
    .alert-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 10px 14px; color: #DC2626; font-size: 0.85rem; margin-bottom: 1rem; }
    @media (max-width: 768px) { .left-panel { display: none; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="brand-name"><i class="fa-solid fa-city"></i> CivicConnect</div>
    <div class="left-heading">Join your civic community</div>
    <div class="left-sub">Create your citizen account and start reporting local issues. Together we build a better city.</div>
  </div>
  <div class="right-panel">
    <div class="auth-card">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Fill in your details to get started</div>
      {% if error %}<div class="alert-error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrap">
              <i class="fa-solid fa-user"></i>
              <input type="text" name="name" placeholder="Amit Shah" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <div class="input-wrap">
              <i class="fa-solid fa-phone"></i>
              <input type="text" name="phone" placeholder="9876543210"/>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" name="email" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="address" rows="2" placeholder="Your residential address"></textarea>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="Choose a strong password" required/>
          </div>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>
      <div class="link-text">Already registered? <a href="/login">Sign in</a></div>
    </div>
  </div>
</body>
</html>
